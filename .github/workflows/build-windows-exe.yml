name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller reportlab pillow

    - name: Build Windows EXE
      run: |
        pyinstaller --onefile --windowed --name "HR_Attendance_System" --icon=icon.ico hr_app.py 2>$null || pyinstaller --onefile --windowed --name "HR_Attendance_System" hr_app.py

    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          dist/HR_Attendance_System.exe
          인사근태관리시스템_사용자매뉴얼.pdf
          build_windows_exe.bat
          README.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
